<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>为sun开的下载站</title>
    <!-- 字体：优雅的衬线 + 无衬线混合 -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        /* ----- 全局重置 & 基础 ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: #0b0a0c;
            /* 深邃底色，为光效留空间 */
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* ----- 华丽动态背景 ----- */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(110px);
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
            animation: floatOrb 18s ease-in-out infinite alternate;
        }

        .bg-orb--1 {
            width: 500px;
            height: 500px;
            top: -15%;
            left: -10%;
            background: radial-gradient(circle, #f7b2b7, #c779d0);
            animation-duration: 22s;
        }

        .bg-orb--2 {
            width: 600px;
            height: 600px;
            bottom: -20%;
            right: -15%;
            background: radial-gradient(circle, #7dd3fc, #a78bfa);
            animation-duration: 26s;
            animation-delay: -6s;
        }

        .bg-orb--3 {
            width: 350px;
            height: 350px;
            top: 40%;
            left: 55%;
            background: radial-gradient(circle, #fcd34d, #f472b6);
            opacity: 0.25;
            animation-duration: 20s;
            animation-delay: -10s;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(40px, -30px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 40px) scale(0.9);
            }
            100% {
                transform: translate(30px, -20px) scale(1.05);
            }
        }

        /* 细微噪点叠加，增加质感 */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 300px 300px;
            opacity: 0.5;
            mix-blend-mode: overlay;
        }

        /* ----- 主卡片：华丽且简洁 ----- */
        .card {
            position: relative;
            z-index: 10;
            max-width: 640px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border-radius: 48px;
            padding: 3.5rem 3rem 4rem;
            text-align: center;
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.7),
                inset 0 1px 0 rgba(255, 255, 255, 0.10),
                0 0 0 1px rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: box-shadow 0.5s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover {
            box-shadow:
                0 50px 120px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.14),
                0 0 0 1px rgba(255, 255, 255, 0.08);
            transform: scale(1.005);
        }

        /* ----- 标题区 ----- */
        .title-group {
            margin-bottom: 2.8rem;
        }

        .title-main {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: clamp(2.6rem, 10vw, 4.4rem);
            letter-spacing: -0.02em;
            color: #fff;
            text-shadow: 0 4px 40px rgba(255, 215, 215, 0.15);
            line-height: 1.12;
        }

        .title-main .highlight {
            background: linear-gradient(135deg, #f9d976, #f39b7b, #e573a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-style: italic;
            font-weight: 400;
            position: relative;
        }

        .title-sub {
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 0.6rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 0.8rem;
            display: inline-block;
        }

        /* 装饰分隔线 */
        .divider {
            width: 60px;
            height: 2px;
            margin: 0 auto 2.2rem;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 215, 0.35), transparent);
            border-radius: 4px;
        }

        /* ----- 下载按钮：华丽焦点 ----- */
        .download-wrapper {
            position: relative;
            display: inline-block;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.9rem;
            padding: 1.2rem 3.2rem 1.2rem 2.8rem;
            background: linear-gradient(135deg, #ffffff 0%, #f0eef2 100%);
            color: #0b0a0c;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 1.25rem;
            letter-spacing: 0.02em;
            border-radius: 80px;
            text-decoration: none;
            border: none;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* 按钮光晕 */
        .download-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 80px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.6), rgba(255, 215, 215, 0.2));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
